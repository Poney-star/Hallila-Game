<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HALLILAA HUB</title>
  <link rel="stylesheet" href="./hub.css">
</head>
<body>
  <main id="desktop" class="desktop">
    <div class="top-note">
      <strong>HALLILAA HUB</strong><br>
      Choisis un jeu en cliquant sur sa photo. Une coche apparaît quand il est terminé.
      Le boss final au milieu reste verrouillé jusqu'à ce que tout le reste soit validé.
    </div>
    <div id="lockNote" class="lock-note"></div>
  </main>

  <div class="taskbar">
    <button class="start-btn" type="button">Démarrer</button>
    <div class="status" id="progressText">0/5 jeux terminés</div>
  </div>

  <script src="./hub.js"></script>
</body>
</html>
